<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/main.css" />
    <script type="module" src="partials/_header_footer.js"></script>
    <!-- Otras etiquetas head si es necesario -->
</head>

<body>

    <div id="header"></div>
    <div class="container">

        <form action="/add" method="post">
            <fieldset>
                <legend>Registor de usuarios</legend>
                <div class="form-group">
                    <label for="" class="form-label mt-4">Numero de identificacion</label>
                    <input type="number" class="form-control" id="id" name="Id" placeholder="">
                </div>
                <div class="form-group">
                    <label for="" class="form-label mt-4">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label for="" class="form-label mt-4">Apellido</label>
                    <input type="text" class="form-control" id="apellido" name="apellido" placeholder="Apellido">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1" class="form-label mt-4">Telefono</label>
                    <input type="number" class="form-control" id="telefono" name="telefono" placeholder="" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="staticEmail" class="col-sm-2 col-form-label">Correo</label>
                    <div class="col-sm-10">
                        <input type="email" class="form-control" id="correo" name="correo">
                    </div>
                </div>
                <div class="form-group">
                    <label for="" class="form-label mt-4">Direccion</label>
                    <input type="text" class="form-control" id="direccion" name="direccion" placeholder="">
                </div>
                <div class="form-group">
                    <label for="" class="form-label mt-4">Ciudad</label>
                    <input type="text" class="form-control" id="ciudad" name="ciudad" placeholder="">
                </div>
                <div class="form-group">
                    <label for="exampleSelect1" class="form-label mt-4">Cargo</label>
                    <select class="form-select" id="rol" name="rol">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1" class="form-label mt-4">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="exampleInputPassword1" class="form-label mt-4">Confirmar contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </fieldset>
        </form>

        <div id="footer"></div>

    </div>

</body>

</html>
